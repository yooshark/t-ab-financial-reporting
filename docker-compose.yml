services:
  postgres:
    image: postgres:17-alpine
    container_name: ab-financial-reporting-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ab-financial-reporting-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://${APP_HOST}:${APP_PORT}/api/utils/health-check" ]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "${APP_PORT}:8000"


volumes:
  postgres_data:
